<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cheeseburger Beer Mile Donor List</title>
    <link href="/css/fundraiser.css" rel="stylesheet" type="text/css">
</head>

<body>
<header class="site-header">
    <nav aria-label="Main navigation">
        <ul>
            <li><a href="/fundraiser/">Fundraiser</a></li>
            <li><a href="/fundraiser/donor-list/">Donor List</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="donor-hero">
        <div class="hero-content">
            <p class="eyebrow">Cheeseburger Beer Mile Fundraiser</p>
            <h1>Committed donors</h1>
            <p class="intro">Public commitments are listed here. Anonymous donors are shown as Anonymous, and emails are never displayed.</p>
            <div class="hero-actions">
                <a class="button" href="/fundraiser/">Add your pledge</a>
            </div>
        </div>
    </section>

    <section class="donor-section" aria-labelledby="donor-list-heading">
        <div class="donor-shell">
            <div class="donor-heading">
                <h2 id="donor-list-heading">Donor list</h2>
                <p id="donorSummary">Loading commitments...</p>
            </div>

            <div id="errorMessage" class="message message-error" role="alert"></div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th scope="col">Donor</th>
                        <th scope="col">Commitment</th>
                    </tr>
                    </thead>
                    <tbody id="donorTableBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/fundraiser-donor-list.js"></script>
</body>
</html>
